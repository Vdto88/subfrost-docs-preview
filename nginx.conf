server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;

    # Docusaurus emits content-hashed assets under /assets/ — safe to pin forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|webp|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # HTML entry points must not be cached, otherwise the browser keeps loading
    # stale chunk references after a deploy.
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Docusaurus pre-renders one file per route — no SPA fallback to index.html.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ $uri.html =404;
    }
}
